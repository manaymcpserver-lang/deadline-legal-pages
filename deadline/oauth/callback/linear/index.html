<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>DeadLine - Linear OAuth</title>
    <style>
        :root {
            color-scheme: dark light;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 24px;
        }
        .hint {
            opacity: 0.88;
            font-size: 16px;
            line-height: 1.4;
            margin: 0;
        }
        .fallback {
            margin-top: 14px;
            display: none;
        }
        .fallback a {
            color: #93c5fd;
            text-decoration: none;
        }
        .fallback a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: light) {
            body {
                background: #fff;
                color: #111827;
            }
            .fallback a {
                color: #2563eb;
            }
        }
    </style>
</head>
<body>
    <div>
        <p class="hint">Returning you to DeadLine...</p>
        <p class="fallback" id="fallback">
            If it does not open, <a id="open-link" href="#">tap here</a>.
        </p>
    </div>
    <script>
        (function () {
            var query = window.location.search || "";
            var appUrl = "deadline://oauth/callback/linear" + query;
            var fallback = document.getElementById("fallback");
            var openLink = document.getElementById("open-link");

            if (openLink) {
                openLink.href = appUrl;
            }

            // Try immediately, then a quick retry to reduce perceived looping on iOS.
            window.location.replace(appUrl);
            setTimeout(function () {
                window.location.href = appUrl;
            }, 120);

            setTimeout(function () {
                if (fallback) {
                    fallback.style.display = "block";
                }
            }, 900);
        })();
    </script>
</body>
</html>
