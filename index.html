<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeadLine Legal</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      background: #0b1020;
      color: #f5f7ff;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 16px; color: #c7d1ff; }
    .card {
      background: #141b33;
      border: 1px solid #2d3a66;
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0;
    }
    a {
      color: #9bb1ff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
    .muted { color: #9aa4cf; font-size: 0.95rem; margin-top: 24px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>DeadLine Legal Pages</h1>
    <p>Official support and privacy pages for the DeadLine app.</p>

    <div class="card"><a href="/privacy/">Privacy Policy</a></div>
    <div class="card"><a href="/terms/">Terms of Service</a></div>
    <div class="card"><a href="/support/">Support</a></div>
    <div class="card"><a href="/data-deletion/">Data Deletion</a></div>

    <p class="muted">Last updated: April 2, 2026</p>
  </main>
</body>
</html>
